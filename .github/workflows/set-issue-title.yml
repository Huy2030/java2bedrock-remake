name: Set Issue Title
on:
  issues:
    types:
      - opened

jobs:
  set-title:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[Pack]')
    permissions:
      issues: write
    steps:
      - name: Rename title to include username
        uses: actions/github-script@v7
        with:
          script: |
            const newTitle = `[Pack]: ${context.payload.issue.user.login}`;
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              title: newTitle
            });
